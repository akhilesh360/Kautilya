services:
  - type: web
    name: kautilya
    runtime: python
    plan: starter
    autoDeploy: true
    rootDir: .
    buildCommand: |
      pip install -r requirements.txt
      python -m textblob.download_corpora
      python setup_nltk.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers=1 --threads=4 --timeout=120 backend.app:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: FMP_API_KEY
        sync: false
